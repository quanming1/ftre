name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Checkout ftre-agent-core
        uses: actions/checkout@v4
        with:
          repository: quanming1/ftre-agent-core
          path: ftre-agent-core

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ./ftre-agent-core
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Syntax check
        run: |
          python -c "import ast, pathlib; [ast.parse(p.read_text(encoding='utf-8')) for p in pathlib.Path('src').rglob('*.py')]"

      - name: Run tests
        run: |
          python -m pytest tests/ -q \
            --ignore=tests/test_octo_channel.py \
            --ignore=tests/test_plugin_tools.py \
            --ignore=tests/test_ws_volatile_replay.py \
            --ignore=tests/test_agent_manager.py \
            --ignore=tests/test_trace_store.py \
            --ignore=tests/test_mcp.py
