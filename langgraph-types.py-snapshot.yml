cy\", \"TimeoutPolicy\", \"CachePolicy\", \"Interrupt\", \"StateUpdate\", \"PregelTask\", \"PregelExecutableTask\", \"StateSnapshot\", \"Send\", \"Command\", \"Durability\", \"interrupt\", \"Overwrite\", \"GraphOutput\", \"ensure_valid_checkpointer\", ) Durability = Literal[\"sync\", \"async\", \"exit\"] \"\"\"Durability mode for the graph execution. - `'sync'`: Changes are persisted synchronously before the next step starts. - `'async'`: Changes are persisted asynchronously while the next step executes. - `'exit'`: Changes are persisted only when the graph exits. \"\"\" All = Literal[\"*\"] \"\"\"Special value to indicate that graph should interrupt on all nodes.\"\"\" Checkpointer = None | bool | BaseCheckpointSaver \"\"\"Type of the checkpointer to use for a subgraph. - `True` enables persistent checkpointing for this subgraph. - `False` disables checkpointing, even if the parent graph has a checkpointer. - `None` inherits checkpointer from the parent graph. \"\"\" def ensure_valid_checkpointer(checkpointer: Checkpointer) -> Checkpointer: if checkpointer not in (None, True, False) and not isinstance( checkpointer, BaseCheckpointSaver ): raise TypeError( \"Invalid checkpointer provided. Expected an instance of \" \"`BaseCheckpointSaver`, `True`, `False`, or `None`. \" f\"Received {type(checkpointer).__name__!s}. \" \"Pass a proper saver (e.g., InMemorySaver, AsyncPostgresSaver).\" ) return checkpointer StreamMode = Literal[ \"values\", \"updates\", \"checkpoints\", \"tasks\", \"debug\", \"messages\", \"custom\" ] \"\"\"How the stream method should emit outputs. - `\"values\"`: Emit all values in the state after each step, including interrupts. When used with functional API, values are emitted once at the end of the workflow. - `\"updates\"`: Emit only the node or task names and updates returned by the nodes or tasks after each step. If multiple updates are made in the same step (e.g. multiple nodes are run) then those updates are emitted separately. - `\"custom\"`