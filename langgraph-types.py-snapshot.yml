                          - generic:
                            - generic:
                              - generic:
                                - generic: "class State(TypedDict):"
                          - generic:
                            - generic:
                              - generic:
                                - generic: "messages: Annotated[list, operator.add]"
                          - generic:
                            - generic:
                              - generic:
                                - generic: "def node_a(state: TypedDict):"
                          - generic:
                            - generic:
                              - generic:
                                - generic: "# Normal update: uses the reducer (operator.add)"
                          - generic:
                            - generic:
                              - generic:
                                - generic: "return {\"messages\": [\"a\"]}"
                          - generic:
                            - generic:
                              - generic:
                                - generic: "def node_b(state: State):"
                          - generic:
                            - generic:
                              - generic:
                                - generic: "# Overwrite: bypasses the reducer and replaces the entire value"
                          - generic:
                            - generic:
                              - generic:
                                - generic: "return {\"messages\": Overwrite(value=[\"b\"])}"
                          - generic:
                            - generic:
                              - generic:
                                - generic: builder = StateGraph(State)
                          - generic:
                            - generic:
                              - generic:
